    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" data-rule="required" class="form-control" name="row[name]" type="text" value="{$row.name|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Image')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-image" data-rule="required" class="form-control" size="50" name="row[image]" type="text" value="{$row.image|htmlentities}">
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="faupload-image" class="btn btn-danger faupload" data-input-id="c-image" data-mimetype="image/gif,image/jpeg,image/png,image/jpg,image/bmp,image/webp" data-multiple="false" data-preview-id="p-image"><i class="fa fa-upload"></i> {:__('Upload')}</button></span>
                    <span><button type="button" id="fachoose-image" class="btn btn-primary fachoose" data-input-id="c-image" data-mimetype="image/*" data-multiple="false"><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                </div>
                <span class="msg-box n-right" for="c-image"></span>
            </div>
            <ul class="row list-inline faupload-preview" id="p-image"></ul>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Salesprice')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-salesprice" data-rule="required" min="0" class="form-control" step="0.01" name="row[salesprice]" type="number" value="{$row.salesprice|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Original_price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-original_price" data-rule="required" min="0" class="form-control" step="0.01" name="row[original_price]" type="number" value="{$row.original_price|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('首单一万内免单')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="radio">
            {foreach name="firstFreeList" item="vo"}
            <label for="row[first_free]-{$key|htmlentities}"><input id="row[first_free]-{$key|htmlentities}" name="row[first_free]" type="radio" value="{$key|htmlentities}" {in name="key" value="$row.first_free"}checked{/in} /> {$vo|htmlentities}</label>
            {/foreach}
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('首单折扣')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-first_discount" data-rule="required" min="1" class="form-control" step="1" name="row[first_discount]" type="number" value="{$row.first_discount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('第一年折扣')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-first_year_discount" data-rule="required" min="1" class="form-control" step="1" name="row[first_year_discount]" type="number" value="{$row.first_year_discount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('第二年折扣')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-second_year_discount" data-rule="required" min="1" class="form-control" step="1" name="row[second_year_discount]" type="number" value="{$row.second_year_discount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('永久折扣')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-perpetual_discount" data-rule="required" min="1" class="form-control" step="1" name="row[perpetual_discount]" type="number" value="{$row.perpetual_discount|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Privilege')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-privilege" data-rule="required" class="form-control editor" name="row[privilege]"
                      rows="50">{$row.privilege|htmlentities}</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Vip_agreement')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-vip_agreement" data-rule="required" class="form-control editor" name="row[vip_agreement]"
                      rows="50">{$row.vip_agreement|htmlentities}</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="statusList" item="vo"}
            <label for="row[status]-{$key|htmlentities}"><input id="row[status]-{$key|htmlentities}" name="row[status]" type="radio" value="{$key|htmlentities}" {in name="key" value="$row.status"}checked{/in} /> {$vo|htmlentities}</label>
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-weigh" data-rule="required" min="0" class="form-control" name="row[weigh]" type="number" value="{$row.weigh|htmlentities}">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
